dependencies:
- access-manager
- artefact-enumerator
- backlog-controller
- cache-manager
- delivery-db
installation:
  ocm_references:
  - artefact:
      name: delivery-service
      version: 0.1344.0
    helm_chart_name: delivery-service
    mappings:
    - artefact_type: helmchart-imagemap
      name: delivery-service
      version: 0.1344.0
    name: ocm.software/open-delivery-gear/core
    version: 0.1344.0
  value_templates:
  - helm_attribute: host
    helm_chart_name: delivery-service
    value: delivery-service.${base_url}
    value_type: python-string-template
  - helm_attribute: target_namespace
    helm_chart_name: delivery-service
    value: ${target_namespace}
    value_type: python-string-template
  - helm_attribute: deployment.annotations."resources.gardener.cloud/preserve-replicas"
    helm_chart_name: delivery-service
    value: '"true"'
    value_type: literal
  - default: '2'
    helm_attribute: autoscaler.minReplicas
    helm_chart_name: delivery-service
    value: ${deliveryServiceMinReplicas}
    value_type: python-string-template
  - default: '10'
    helm_attribute: autoscaler.maxReplicas
    helm_chart_name: delivery-service
    value: ${deliveryServiceMaxReplicas}
    value_type: python-string-template
name: delivery-service
outputs:
- name: delivery-service-url
  value: https://delivery-service.${base_url}
---
dependencies: []
installation:
  ocm_references:
  - artefact:
      name: postgresql
      version: 16.6.1
    helm_chart_name: postgresql
    mappings:
    - artefact_type: helmchart-imagemap
      name: postgresql
      version: 0.1344.0
    name: ocm.software/open-delivery-gear/core
    version: 0.1344.0
  value_templates:
  - helm_attribute: fullnameOverride
    helm_chart_name: postgresql
    value: delivery-db
    value_type: literal
  - helm_attribute: namespaceOverride
    helm_chart_name: postgresql
    value: ${target_namespace}
    value_type: python-string-template
  - helm_attribute: image.registry
    helm_chart_name: postgresql
    value: ''
    value_type: literal
  - helm_attribute: global.security.allowInsecureImages
    helm_chart_name: postgresql
    value: true
    value_type: literal
  - helm_attribute: postgresqlDataDir
    helm_chart_name: postgresql
    value: /data/pgdata
    value_type: literal
  - helm_attribute: primary.persistence.mountPath
    helm_chart_name: postgresql
    value: /data/
    value_type: literal
  - helm_attribute: primary.containerSecurityContext.readOnlyRootFilesystem
    helm_chart_name: postgresql
    value: false
    value_type: literal
  - helm_attribute: primary.extraEnvVars
    helm_chart_name: postgresql
    value:
    - name: POSTGRESQL_MAX_CONNECTIONS
      value: '200'
    value_type: literal
  - helm_attribute: primary.resources.requests.cpu
    helm_chart_name: postgresql
    value: 250m
    value_type: literal
  - helm_attribute: primary.resources.requests.memory
    helm_chart_name: postgresql
    value: 256Mi
    value_type: literal
  - helm_attribute: auth.existingSecret
    helm_chart_name: postgresql
    value: delivery-db-password
    value_type: literal
name: delivery-db
outputs: []
