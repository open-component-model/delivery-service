cfgs:
  default:
    branches: ['master']
    inherit:
      delivery-service:
        inherit:
          check-steps: &check-steps
            steps: &steps
              smoke-test:
                execute: smoke-test
              lint:
                execute: lint
              test:
                execute: test
        jobs:
          pull-request:
            <<: *check-steps
            traits:
              pull-request: ~
              component_descriptor:
                ocm_repository: europe-docker.pkg.dev/gardener-project/snapshots
          update-dependencies:
            traits:
              update_component_deps:
                merge_policies:
                - merge_mode: auto_merge
                  merge_method: rebase
              cronjob:
                interval: 5m
              component_descriptor:
                ocm_repository: europe-docker.pkg.dev/gardener-project/snapshots
          head-update:
            steps:
              <<: *steps
              build_python_packages:
                output_dir: packages
            traits:
              notifications:
                default:
                  on_error:
                    triggering_policy: only_first
              component_descriptor:
                ocm_repository: europe-docker.pkg.dev/gardener-project/snapshots
              publish:
                dockerimages:
                  delivery-service:
                    image: europe-docker.pkg.dev/gardener-project/snapshots/ocm-gear/delivery-service
                    dockerfile: Dockerfile.service
                    tag_as_latest: False
                    inputs:
                      steps:
                        build_python_packages: ~
                  extensions:
                    image: europe-docker.pkg.dev/gardener-project/snapshots/ocm-gear/extensions
                    dockerfile: Dockerfile.extensions
                    tag_as_latest: False
                    inputs:
                      steps:
                        build_python_packages: ~
                  extension-cache-manager:
                    image: europe-docker.pkg.dev/gardener-project/snapshots/ocm-gear/extension-cache-manager
                    dockerfile: Dockerfile.extensions.cache-manager
                    tag_as_latest: False
                    inputs:
                      steps:
                        build_python_packages: ~
                  extension-clamav:
                    image: europe-docker.pkg.dev/gardener-project/snapshots/ocm-gear/extension-clamav
                    dockerfile: Dockerfile.extensions.clamav
                    tag_as_latest: False
                    inputs:
                      steps:
                        build_python_packages: ~

  hotfix-branches:
    branches: ['hotfix-.*']
    inherit:
      delivery-service:
        jobs:
          manual-release:
            traits:
              version:
                preprocess: finalise-skip-patchlevel-zero
              release:
                nextversion: bump_patch
