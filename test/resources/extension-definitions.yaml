name: delivery-service
installation:
  ocm_references:
  - ref_name: delivery-service
    name: ocm.software/ocm-gear/delivery-service
    version: 0.1142.0
    artefact:
      name: delivery-service
      version: 0.1142.0
    mappings: []
  values:
  - helm_reference: delivery-service
    helm_attribute: ingress.hosts
    value:
    - delivery-service.${base_url}
  - helm_reference: delivery-service
    helm_attribute: target_namespace
    value: ${target_namespace}
  - helm_reference: delivery-service
    helm_attribute: pod.annotations."resources.gardener.cloud/preserve-replicas"
    value: '"true"'
outputs:
- name: delivery-service-url
  value: delivery-service.${base_url}
dependencies:
- delivery-db
---
name: delivery-dashboard
installation:
  ocm_references:
  - ref_name: delivery-dashboard
    name: ocm.software/ocm-gear/delivery-dashboard
    version: 0.386.0
    artefact:
      name: delivery-dashboard
      version: 0.386.0
    mappings:
    - name: delivery-dashboard
      version: 0.386.0
  values:
  - helm_reference: delivery-dashboard
    helm_attribute: target_namespace
    value: ${target_namespace}
  - helm_reference: delivery-dashboard
    helm_attribute: ingress.hosts
    value:
    - delivery-dashboard.${base_url}
  - helm_reference: delivery-dashboard
    helm_attribute: envVars.REACT_APP_DELIVERY_SERVICE_API_URL
    value: dependencies.delivery-service.outputs.delivery-service-url
outputs: []
dependencies:
- delivery-service
---
name: delivery-db
installation:
  ocm_references:
  - ref_name: delivery-database
    name: ocm.software/ocm-gear/delivery-database
    version: 0.7.0
    artefact:
      name: postgresql
      version: 16.6.1
    mappings: []
  values:
  - helm_reference: delivery-database
    helm_attribute: fullnameOverride
    value: delivery-db
  - helm_reference: delivery-database
    helm_attribute: namespaceOverride
    value: ${target_namespace}
  - helm_reference: delivery-database # TODO: replace once delivery-database ocm also publishes helm mappings
    helm_attribute: image.tag
    value: '"europe-docker.pkg.dev/gardener-project/releases/ocm-gear/postgres:16.8.0"'
outputs: []
dependencies: []
