{{- $podName := "sla-violation-profiler" }}

apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ $podName }}
  namespace: {{ .Values.target_namespace | default .Release.Namespace }}
spec:
  schedule: {{ default "0 0 * * *" .Values.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: {{ default 1 .Values.successful_jobs_history_limit }}
  failedJobsHistoryLimit: {{ default 1 .Values.failed_jobs_history_limit }}
  jobTemplate:
    spec:
      backoffLimit: {{ default 6 .Values.backoff_limit }}
      ttlSecondsAfterFinished: {{ default 43200 .Values.ttl_seconds_after_finished }}
      template:
        metadata:
          labels:
            app: {{ $podName }}
        spec:
          containers:
          - name: {{ $podName }}
            image: {{ include "image" .Values.image }}
            imagePullPolicy: IfNotPresent
            command:
            - python3
            - -m
            - sla_violation_profiler
            securityContext:
              allowPrivilegeEscalation: false
            env:
            - name: SECRET_FACTORY_PATH
              value: /secrets
            - name: EXTENSIONS_CFG_PATH
              value: /extensions_cfg/extensions_cfg
            - name: OCM_REPO_MAPPINGS_PATH
              value: /ocm_repo_mappings/ocm_repo_mappings
            - name: K8S_TARGET_NAMESPACE
              value: {{ .Values.target_namespace | default .Release.Namespace }}
            volumeMounts:
            - name: github
              mountPath: /secrets/github
            - name: github-app
              mountPath: /secrets/github-app
            - name: kubernetes
              mountPath: /secrets/kubernetes
            - name: oci-registry
              mountPath: /secrets/oci-registry
            - name: extensions-cfg
              mountPath: /extensions_cfg
            - name: ocm-repo-mappings
              mountPath: /ocm_repo_mappings
              readOnly: true
          volumes:
            - name: github
              secret:
                secretName: secret-factory-github
                optional: true
            - name: github-app
              secret:
                secretName: secret-factory-github-app
                optional: true
            - name: kubernetes
              secret:
                secretName: secret-factory-kubernetes
                optional: true 
            - name: oci-registry
              secret:
                secretName: secret-factory-oci-registry
                optional: true
            - name: extensions-cfg
              configMap:
                name: extensions-cfg
            - name: ocm-repo-mappings
              configMap:
                name: ocm-repo-mappings
          restartPolicy: Never
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-from-cache-manager
  namespace: {{ .Values.target_namespace | default .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app: {{ $podName }}
  policyTypes:
    - Egress
  egress:
    - {}  # Allows all egress traffic to any destination and port
          