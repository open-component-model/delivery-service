{{- $podName := "blackduck" }}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $podName }}
  namespace: {{ .Values.target_namespace | default .Release.Namespace }}
spec:
  replicas: 0 # will be scaled automatically by backlog-controller
  selector:
    matchLabels:
      app: {{ $podName }}
      delivery-gear.gardener.cloud/service: blackduck
  template:
    metadata:
      labels:
        app: {{ $podName }}
        delivery-gear.gardener.cloud/service: blackduck
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: {{ $podName }}
      terminationGracePeriodSeconds: 1800 # 30 min
      containers:
        - name: {{ $podName }}
          image: {{ include "image" .Values.image }}
          imagePullPolicy: IfNotPresent
          command:
            - python3
            - -m
            - blackduck_extension
          securityContext:
            allowPrivilegeEscalation: false
          env:
            - name: SECRET_FACTORY_PATH
              value: /secrets
            - name: EXTENSIONS_CFG_PATH
              value: /extensions_cfg/extensions_cfg
            - name: FINDINGS_CFG_PATH
              value: /findings_cfg/findings_cfg
            - name: K8S_TARGET_NAMESPACE
              value: {{ .Values.target_namespace | default .Release.Namespace }}
          volumeMounts:
            - name: bdba
              mountPath: /secrets/bdba
            - name: blackduck
              mountPath: /secrets/blackduck
            - name: extensions-cfg
              mountPath: /extensions_cfg
              readOnly: true
          lifecycle:
            preStop: # hook ensures that just created pods have at least enough time alive to add a termination signal handler
              exec:
                command:
                  - sleep
                  - "60"
          resources:
            requests:
              memory: 300Mi
              cpu: 250m
            limits:
              memory: 600Mi
              cpu: 500m
      volumes:
        - name: bdba
          secret:
            secretName: secret-factory-bdba
        - name: blackduck
          secret:
            secretName: secret-factory-blackduck
        - name: extensions-cfg
          configMap:
            name: extensions-cfg
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-from-blackduck
  namespace: {{ .Values.target_namespace | default .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app: {{ $podName }}
  policyTypes:
    - Egress
  egress:
    - {}  # Allows all egress traffic to any destination and port
