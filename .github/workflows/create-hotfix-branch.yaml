name: Create Hotfix Branch
on:
  workflow_dispatch:
    inputs:
      delivery-service-version:
        type: string
        required: true
        description: |
          Delivery-Service version to create hotfix branch for (`major.minor`)

jobs:
  create-hotfix-branch:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: gardener/cc-utils/.github/actions/trusted-checkout@v1
        with:
          token-server: ${{ vars.FEDERATED_GITHUB_ACCESS_TOKEN_SERVER }}
          github-auth-token-permissions: |
            contents: write
            workflows: write
          init-git-identity: true
      - name: Create and push hotfix branch
        shell: bash
        env:
          DELIVERY_SERVICE_VERSION: ${{ inputs.delivery-service-version }}
        run: |
          delivery_service_version="$DELIVERY_SERVICE_VERSION"

          if [[ ! "$delivery_service_version" =~ ^[0-9]+\.[0-9]+$ ]]; then
            echo "Error: delivery-service-version must adhere 'major.minor' format"
            exit 1
          fi

          git fetch origin "refs/tags/${delivery_service_version}.0:refs/tags/${delivery_service_version}.0"
          git checkout "${delivery_service_version}.0"

          next_version="${delivery_service_version}.1-dev"
          echo "$next_version" | .ci/write-version
          git commit --all -m "next version: ${next_version}"

          git push origin "@:refs/heads/hotfix-$delivery_service_version"
